<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>האתר של מאור</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Assistant', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            overflow: hidden;
        }
        .fade-in {
            animation: fadeIn 2s ease-in forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .glow {
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
        }
        /* צורות רקע עדינות */
        .blob {
            position: absolute;
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, #0ea5e9 0%, #2563eb 100%);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            opacity: 0.15;
            animation: float 10s infinite alternate;
        }
        @keyframes float {
            from { transform: translate(0, 0); }
            to { transform: translate(50px, 50px); }
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div class="blob" style="top: 10%; right: 10%;"></div>
    <div class="blob" style="bottom: 10%; left: 10%; animation-delay: -5s;"></div>

    <main class="text-center px-6 fade-in">
        <header class="mb-8">
            <h1 class="text-4xl md:text-6xl font-bold mb-4 tracking-tight">
                האתר של <span class="text-sky-400">מאור</span>
            </h1>
            <div class="h-1 w-24 bg-sky-500 mx-auto rounded-full opacity-50"></div>
        </header>

        <section class="space-y-6">
            <p class="text-xl md:text-2xl text-slate-400 font-light">
                כרגע... אין כאן כלום.
            </p>
            
            <div class="pt-12">
                <p class="text-sm md:text-base text-slate-500 italic max-w-md mx-auto leading-relaxed">
                    אבל אם אתם חברים שלו – בטח כבר קיבלתם כתובת של דף ספציפי מסקרן... :)
                </p>
            </div>
        </section>

        <footer class="fixed bottom-8 w-full left-0 text-slate-600 text-xs tracking-widest">
            &copy; 2024 MAOR'S SPACE
        </footer>
    </main>

    <script>
        // אפקט קטן למעקב עכבר על ה-blobs אם רוצים להוסיף עניין
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
            const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
            document.querySelectorAll('.blob').forEach(blob => {
                blob.style.transform = `translate(${moveX}px, ${moveY}px)`;
            });
        });
    </script>
</body>
</html>
